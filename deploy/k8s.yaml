apiVersion: apps/v1
kind: Deployment
metadata: { name: readiness, labels: { app: readiness } }
spec:
  replicas: 1
  selector: { matchLabels: { app: readiness } }
  template:
    metadata: { labels: { app: readiness } }
    spec:
      containers:
        - name: readiness
          image: ghcr.io/cognis-digital/readiness:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: readiness }
spec:
  selector: { app: readiness }
  ports: [{ port: 80, targetPort: 8000 }]
